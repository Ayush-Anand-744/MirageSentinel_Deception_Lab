# ╔══════════════════════════════════════════════════════╗
# ║           MirageSentinel Deception Lab — Two Layer Stack      ║
# ╠══════════════════════════════════════════════════════╣
# ║  Layer 1 — Control Plane  : docker compose up        ║
# ║  Layer 2 — Honeynet (K8s) : ./k8s/deploy.sh          ║
# ║                                                      ║
# ║  Honeypot pods POST CRDT heartbeats to:              ║
# ║  http://host.docker.internal:3001/api/vms/heartbeat  ║
# ╚══════════════════════════════════════════════════════╝

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - miragesentinel_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - miragesentinel_network

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/miragesentinel_deception}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-development}
      SIMULATION_MODE: ${SIMULATION_MODE:-true}
      CRDT_SYNC_INTERVAL: ${CRDT_SYNC_INTERVAL:-10000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      K8S_MODE: "true"
      K8S_NAMESPACE: "miragesentinel-honeynet"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - miragesentinel_network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - miragesentinel_network

volumes:
  miragesentinel_mongo_data:

networks:
  miragesentinel_network:
    driver: bridge
