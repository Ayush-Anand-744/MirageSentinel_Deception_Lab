apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: miragesentinel-honeynet
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
  - role: worker
  - role: worker
networking:
  disableDefaultCNI: false
kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
