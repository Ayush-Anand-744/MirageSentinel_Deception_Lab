apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
  namespace: miragesentinel-honeynet
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 1024

    defaults
      mode http
      log global
      timeout connect 5s
      timeout client 30s
      timeout server 30s
      option httplog

    frontend ft_http
      bind *:80
      default_backend bk_web_decoy

    frontend ft_stats
      bind *:8080
      stats enable
      stats uri /stats
      stats refresh 10s
      stats show-legends

    backend bk_web_decoy
      server web1 fake-web-01:80 check
