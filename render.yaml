services:
  - type: web
    name: miragesentinel-deception-api
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SIMULATION_MODE
        value: true
      - key: CRDT_SYNC_INTERVAL
        value: 10000
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: miragesentinel-deception-web
    env: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: starter
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
